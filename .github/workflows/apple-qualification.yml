name: Apple device qualification

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apple-qualification.yml"
      - "CMakeLists.txt"
      - "bindings/node/**"
      - "contracts/apple-provider-baselines.schema.json"
      - "include/**"
      - "src/**"
      - "tests/integration/apple.cpp"
      - "tests/python/test_apple_qualification.py"
      - "tools/apple/**"
      - "tools/benchmark/**"
      - "tools/common/**"
      - "tools/leak_check/**"
  workflow_dispatch:
    inputs:
      run_qualification:
        description: Confirm the full M1 and M2 Apple qualification run
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: apple-qualification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  derive-models:
    if: github.event_name == 'pull_request' || inputs.run_qualification
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install the hash-locked Apple model toolchain
        run: python -m pip install --require-hashes -r tools/apple/requirements.lock
      - name: Bootstrap and derive the deterministic Apple models
        shell: bash
        run: |
          python tools/bootstrap_models.py --cache-dir .cache/models
          python tools/package_model_bundle.py
          python tools/apple/convert_models.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: apple-fp16-models
          path: models/generated/apple-fp16-20260715.1
          if-no-files-found: error
          retention-days: 30

  qualify:
    if: github.event_name == 'pull_request' || inputs.run_qualification
    needs: derive-models
    name: qualify ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: apple-m1
            runner: macos-15
            family: Apple M1
          - id: apple-m2
            runner: macos-15-xlarge
            family: Apple M2
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Install the hash-locked Apple toolchain
        run: python -m pip install --require-hashes -r tools/apple/requirements.lock
      - name: Bootstrap pinned dependencies and CPU model
        shell: bash
        run: |
          python tools/bootstrap_dependencies.py --cache-dir .cache/dependencies
          python tools/bootstrap_dependencies.py --cache-dir .cache/dependencies --offline
          python tools/bootstrap_models.py --cache-dir .cache/models
          python tools/package_model_bundle.py
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: apple-fp16-models
          path: models/generated/apple-fp16-20260715.1
      - name: Verify the runner and package its qualified provider
        shell: bash
        env:
          EXPECTED_FAMILY: ${{ matrix.family }}
          RUNNER_LABEL: ${{ matrix.runner }}
        run: |
          brand="$(sysctl -n machdep.cpu.brand_string)"
          [[ "$brand" == "$EXPECTED_FAMILY"* ]]
          python tools/apple/package_bundle.py \
            --qualified-device-family "$EXPECTED_FAMILY"
          mkdir -p "reports/apple/${{ matrix.id }}"
          python -c 'import json,os,platform,subprocess; print(json.dumps({"schemaVersion":"1.0","expectedDeviceFamily":os.environ["EXPECTED_FAMILY"],"deviceBrand":subprocess.check_output(["sysctl","-n","machdep.cpu.brand_string"],text=True).strip(),"operatingSystem":platform.platform(),"runnerLabel":os.environ["RUNNER_LABEL"]},sort_keys=True))' \
            > "reports/apple/${{ matrix.id }}/identity.json"
      - name: Install verified Node development files
        shell: bash
        run: |
          node_version="$(node -p process.versions.node)"
          node_dev="$PWD/.cache/node-gyp/$node_version"
          npx --yes node-gyp@11.4.2 install "$node_version" --devdir "$PWD/.cache/node-gyp"
          test -f "$node_dev/include/node/node_api.h"
          echo "NODE_INCLUDE_DIR=$node_dev/include/node" >> "$GITHUB_ENV"
      - name: Configure and build the Apple runtime
        shell: bash
        run: >-
          cmake -S . -B build-apple -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLIGHT_OCR_DEPENDENCY_CACHE_DIR="$PWD/.cache/dependencies"
          -DLIGHT_OCR_BUILD_NODE=ON
          -DLIGHT_OCR_BUILD_TESTS=ON
          -DLIGHT_OCR_BUILD_TOOLS=ON
          -DLIGHT_OCR_NODE_INCLUDE_DIR="$NODE_INCLUDE_DIR"
          -DLIGHT_OCR_NODE_EXECUTABLE="$(command -v node)"
      - name: Run native and Node contract tests
        run: |
          cmake --build build-apple --parallel
          ctest --test-dir build-apple --output-on-failure
      - name: Qualify all Core ML functions and the locked quality corpus
        shell: bash
        run: |
          root="$PWD/reports/apple/${{ matrix.id }}"
          python tools/apple/qualify_models.py \
            --jobs 2 \
            --report "$root/model-qualification.json"
          python tools/apple/quality_gate.py \
            --native-validate build-apple/bin/light_ocr_validate \
            --bundle models/generated/ppocrv6-small-apple-20260715.1 \
            --report "$root/quality.json"
      - name: Run latency, CPU-time, cache, RSS, and lifecycle gates
        shell: bash
        run: |
          root="$PWD/reports/apple/${{ matrix.id }}"
          python tools/apple/cache_concurrency_gate.py \
            --native-benchmark build-apple/bin/light_ocr_benchmark \
            --bundle models/generated/ppocrv6-small-apple-20260715.1 \
            --report "$root/cache-concurrency.json"
          python tools/apple/performance_gate.py \
            --native-benchmark build-apple/bin/light_ocr_benchmark \
            --cpu-bundle models/generated/ppocrv6-small-onnx-20260714.2 \
            --apple-bundle models/generated/ppocrv6-small-apple-20260715.1 \
            --clear-compiled-cache \
            --report "$root/performance.json"
          build-apple/bin/light_ocr_leak_check \
            --bundle models/generated/ppocrv6-small-apple-20260715.1 \
            --pixels corpus/fixtures/paddleocr-xfund-form/pixels.bin \
            --width 1488 --height 2105 --stride 4464 --format bgr8 \
            --profile apple_interactive --reuse-engine \
            --warmup 2 --iterations 100 \
            --report "$root/lifecycle.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: apple-qualification-${{ matrix.id }}
          path: reports/apple/${{ matrix.id }}
          if-no-files-found: error
          retention-days: 90

  collect:
    if: github.event_name == 'pull_request' || inputs.run_qualification
    needs: qualify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: apple-qualification-*
          path: reports/apple/devices
          merge-multiple: false
      - name: Validate and collect the two-device candidate
        run: >-
          python tools/apple/collect_qualification.py
          --reports-root reports/apple/devices
          --git-commit "$GITHUB_SHA"
          --output reports/apple/provider-baselines.candidate.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: apple-provider-baselines-candidate
          path: reports/apple/provider-baselines.candidate.json
          if-no-files-found: error
          retention-days: 90
