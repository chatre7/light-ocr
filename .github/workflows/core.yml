name: core

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: core-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1:
    name: ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            runner: macos-15
            executable_suffix: ""
            binary_dir: build-ci/bin
          - id: macos-x64
            runner: macos-15-intel
            executable_suffix: ""
            binary_dir: build-ci/bin
          - id: windows-x64
            runner: windows-2022
            executable_suffix: ".exe"
            binary_dir: build-ci/bin/Release
          - id: linux-x64
            runner: ubuntu-24.04
            executable_suffix: ""
            binary_dir: build-ci/bin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Bootstrap pinned dependencies and models
        shell: bash
        run: |
          python tools/bootstrap_dependencies.py --cache-dir .cache/dependencies
          python tools/bootstrap_dependencies.py --cache-dir .cache/dependencies --offline
          python tools/bootstrap_models.py --cache-dir .cache/models
          python tools/package_model_bundle.py
      - name: Configure without dependency network access (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake -S . -B build-ci -G Ninja -DCMAKE_BUILD_TYPE=Release -DLIGHT_OCR_DEPENDENCY_CACHE_DIR="$PWD/.cache/dependencies"
      - name: Configure without dependency network access (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cmake -S . -B build-ci -G "Visual Studio 17 2022" -A x64 -DLIGHT_OCR_DEPENDENCY_CACHE_DIR="$PWD/.cache/dependencies"
      - name: Build
        run: cmake --build build-ci --config Release --parallel
      - name: Test real PP-OCRv6 models
        run: ctest --test-dir build-ci -C Release --output-on-failure
      - name: Sterile current-directory and locale check
        shell: bash
        run: >-
          python tools/run_offline_check.py
          --validate ${{ matrix.binary_dir }}/light_ocr_validate${{ matrix.executable_suffix }}
          --bundle models/generated/ppocrv6-small-onnx-20260714.2
          --fixture corpus/fixtures/generated-hello-123/fixture.json
      - name: Runtime check with the network namespace disabled
        if: matrix.id == 'linux-x64'
        shell: bash
        run: >-
          sudo unshare --net --
          python3 tools/run_offline_check.py
          --validate build-ci/bin/light_ocr_validate${{ matrix.executable_suffix }}
          --bundle models/generated/ppocrv6-small-onnx-20260714.2
          --fixture corpus/fixtures/generated-hello-123/fixture.json
          --require-network-disabled
      - name: Repeated lifecycle RSS gate
        shell: bash
        run: >-
          ./${{ matrix.binary_dir }}/light_ocr_leak_check${{ matrix.executable_suffix }}
          --bundle models/generated/ppocrv6-small-onnx-20260714.2
          --pixels corpus/fixtures/generated-hello-123/pixels.bin
          --width 800 --height 180 --stride 2400 --format bgr8
          --warmup 5 --iterations 10
          --report reports/release/${{ matrix.id }}/leak.json
      - name: Generate build manifest, licenses, and SPDX SBOM
        shell: bash
        run: python tools/generate_release_metadata.py --build-dir build-ci --output-dir reports/release/${{ matrix.id }} --platform-id ${{ matrix.id }} --configuration Release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: light-ocr-core-${{ matrix.id }}
          path: |
            ${{ matrix.binary_dir }}/light_ocr_*
            ${{ matrix.binary_dir }}/onnxruntime*
            ${{ matrix.binary_dir }}/libonnxruntime*
            build-ci/**/light_ocr_core.lib
            build-ci/**/liblight_ocr_core.a
            reports/release/${{ matrix.id }}
            build-ci/reports/tiled

  safety:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Bootstrap unit tests
        run: python3 -m unittest discover -s tests/python -p 'test_*.py'
      - name: Bootstrap
        run: |
          python3 tools/bootstrap_dependencies.py --cache-dir .cache/dependencies
          python3 tools/bootstrap_models.py --cache-dir .cache/models
      - name: ASan and UBSan
        run: |
          CC=clang CXX=clang++ cmake -S . -B build-asan -G Ninja -DCMAKE_BUILD_TYPE=Debug -DLIGHT_OCR_BUILD_TOOLS=OFF -DLIGHT_OCR_ENABLE_SANITIZERS=ON -DLIGHT_OCR_DEPENDENCY_CACHE_DIR="$PWD/.cache/dependencies"
          cmake --build build-asan --parallel
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 ctest --test-dir build-asan --output-on-failure
      - name: ThreadSanitizer
        run: |
          CC=clang CXX=clang++ cmake -S . -B build-tsan -G Ninja -DCMAKE_BUILD_TYPE=Debug -DLIGHT_OCR_BUILD_TOOLS=OFF -DLIGHT_OCR_ENABLE_THREAD_SANITIZER=ON -DLIGHT_OCR_DEPENDENCY_CACHE_DIR="$PWD/.cache/dependencies"
          cmake --build build-tsan --parallel
          TSAN_OPTIONS=halt_on_error=1:second_deadlock_stack=1 ctest --test-dir build-tsan --output-on-failure
      - name: libFuzzer smoke
        run: |
          CC=clang CXX=clang++ cmake -S . -B build-fuzz -G Ninja -DCMAKE_BUILD_TYPE=Debug -DLIGHT_OCR_BUILD_TESTS=OFF -DLIGHT_OCR_BUILD_TOOLS=OFF -DLIGHT_OCR_BUILD_FUZZERS=ON -DLIGHT_OCR_ENABLE_SANITIZERS=ON -DLIGHT_OCR_DEPENDENCY_CACHE_DIR="$PWD/.cache/dependencies"
          cmake --build build-fuzz --parallel
          ./build-fuzz/bin/light_ocr_fuzz_image -runs=100000
          ./build-fuzz/bin/light_ocr_fuzz_bundle -runs=100000
          ./build-fuzz/bin/light_ocr_fuzz_geometry -runs=100000
          LIGHT_OCR_MODEL_BUNDLE="$PWD/models/generated/ppocrv6-small-onnx-20260714.2" ./build-fuzz/bin/light_ocr_fuzz_lifecycle -runs=10 -max_len=64

  oracle:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install the hash-locked oracle
        run: python -m pip install --require-hashes -r oracle/requirements.lock
      - name: Bootstrap pinned native inputs
        run: |
          python tools/bootstrap_dependencies.py --cache-dir .cache/dependencies
          python tools/bootstrap_models.py --cache-dir .cache/models
      - name: Build the Release probe
        run: |
          cmake -S . -B build-oracle -G Ninja -DCMAKE_BUILD_TYPE=Release -DLIGHT_OCR_DEPENDENCY_CACHE_DIR="$PWD/.cache/dependencies" -DLIGHT_OCR_ORACLE_PYTHON="$(command -v python)" -DLIGHT_OCR_PARITY_LIVE_ORACLE=ON
          cmake --build build-oracle --parallel
      - name: Full stage parity and first-bundle quality baseline
        run: ctest --test-dir build-oracle --output-on-failure -L acceptance
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: light-ocr-oracle-reports
          path: build-oracle/reports
